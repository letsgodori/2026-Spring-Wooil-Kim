<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>중간 프로젝트 웹사이트</title>
  <style>
    /* 웹사이트 전체의 스타일을 지정합니다. */
    body {
      display: flex; /* 화면 요소를 유연하게 배치합니다. */
      flex-direction: column; /* 요소를 위에서 아래로 세로로 정렬합니다. */
      align-items: center; /* 요소들을 가로 방향 중앙에 정렬합니다. */
      justify-content: flex-start; /* 요소들을 화면 맨 위부터 배치합니다. */
      height: 100vh; /* 화면 전체 높이를 사용합니다. */
      margin: 0; /* 기본 여백을 없앱니다. */
      padding-top: 10vh; /* 화면 위에서 제목까지의 간격을 둡니다. */
      background-color: #f9f9f9; /* 배경색을 밝은 회색으로 지정합니다. */
      font-family: sans-serif; /* 글꼴을 깔끔하게 바꿉니다. */
    }

    /* 제목 스타일 */
    .제목 {
      margin-top: 0; /* 제목 위쪽 간격 제거 */
      margin-bottom: 5vh; /* 제목과 입력창 사이의 간격 */
      font-size: 2.5rem; /* 제목 글자 크기를 크게 */
      color: #333; /* 글자 색상 */
    }

    /* 입력창(글쓰기 영역) 스타일 */
    .입력-창 {
      width: 80%; /* 입력창 너비를 화면의 80%로 */
      max-width: 600px; /* 입력창 최대 너비 제한 */
      height: 15rem; /* 입력창 높이 (글을 많이 쓸 수 있게) */
      padding: 1rem; /* 입력창 안쪽 여백 */
      font-size: 1.2rem; /* 입력하는 글자 크기 */
      border: 2px solid #ddd; /* 테두리 스타일과 색상 */
      border-radius: 10px; /* 테두리 모서리를 둥글게 */
      box-sizing: border-box; /* 패딩과 테두리를 포함하여 너비를 계산 */
      resize: vertical; /* 입력창 높이만 조절 가능하게 */
    }
  </style>
</head>
<body>

  <h1 class="제목">중간 프로젝트</h1>
  <textarea class="입력-창" placeholder="여기에 글을 입력하세요..."></textarea>

</body>
</html>
